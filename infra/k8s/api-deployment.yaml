apiVersion: apps/v1
kind: Deployment
metadata:
  name: finlytics-api
  labels: { app: finlytics-api }
spec:
  replicas: 3
  selector: { matchLabels: { app: finlytics-api } }
  template:
    metadata: { labels: { app: finlytics-api } }
    spec:
      containers:
        - name: api
          image: finlytics/api:latest
          ports: [{ containerPort: 3000 }]
          envFrom:
            - secretRef: { name: finlytics-secrets }
          readinessProbe:
            httpGet: { path: /v1/health/ready, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /v1/health, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: finlytics-api }
spec:
  selector: { app: finlytics-api }
  ports: [{ port: 80, targetPort: 3000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: finlytics-api-hpa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: finlytics-api }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
