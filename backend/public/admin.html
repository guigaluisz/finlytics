<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finlytics — Painel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{--primary:#1F6FEB;--secondary:#00B37E;--danger:#E5484D;--warning:#F5A623;
    --bg:#F7F8FA;--surface:#FFFFFF;--text:#1A1D23;--muted:#6B7280;--border:#E5E7EB;}
  [data-theme="dark"]{--primary:#4C8DFF;--secondary:#1DD1A1;--danger:#FF6369;--warning:#FFB938;
    --bg:#0E1116;--surface:#171B22;--text:#E6E8EB;--muted:#9BA1A8;--border:#272B33;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',system-ui,Segoe UI,Roboto,sans-serif}
  body{background:var(--bg);color:var(--text)}
  .hidden{display:none!important}
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
  .login-card{width:100%;max-width:380px;padding:32px}
  .brand{font-size:24px;font-weight:800;color:var(--primary);margin-bottom:4px}
  .sub{color:var(--muted);margin-bottom:24px;font-size:14px}
  label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px}
  input,select{width:100%;padding:11px;border:1px solid var(--border);border-radius:10px;font-size:15px;background:var(--surface);color:var(--text)}
  button{cursor:pointer;border:none;border-radius:10px;font-weight:600;font-size:14px}
  .btn-primary{background:var(--primary);color:#fff;padding:12px}
  .btn-primary.block{width:100%;margin-top:20px;padding:13px}
  .btn-primary:disabled{opacity:.6;cursor:default}
  .err{color:var(--danger);font-size:13px;margin-top:10px;min-height:18px}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:10px}
  header .brand{font-size:18px;margin:0}
  .userbox{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted)}
  .badge{background:var(--primary);color:#fff;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:700}
  .badge.free{background:var(--muted)}
  .ghost{background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 12px}
  nav.tabs{display:flex;gap:6px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
  nav.tabs button{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:14px 12px;font-weight:600;white-space:nowrap}
  nav.tabs button.active{color:var(--primary);border-bottom-color:var(--primary)}
  main{max-width:1100px;margin:0 auto;padding:24px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:20px}
  .kpi{padding:18px}
  .kpi .lbl{font-size:13px;color:var(--muted)}
  .kpi .val{font-size:24px;font-weight:800;margin-top:6px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .panel{padding:20px}
  .panel h3{font-size:15px;margin-bottom:14px}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:9px 6px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
  .pos{color:var(--secondary);font-weight:700}
  .neg{color:var(--danger);font-weight:700}
  .actions button{padding:5px 9px;margin-left:5px;font-size:13px}
  .del{color:var(--danger);border-color:var(--danger)}
  .alert{padding:12px;border-left:3px solid var(--warning);background:rgba(245,166,35,.12);border-radius:8px;margin-bottom:10px}
  .alert .t{font-weight:700;font-size:14px}
  .alert .m{font-size:13px;color:var(--muted)}
  .muted{color:var(--muted);font-size:14px}
  .toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
  .prog{height:8px;background:var(--border);border-radius:999px;overflow:hidden;margin:8px 0}
  .prog > i{display:block;height:100%;background:var(--secondary)}
  .goalcard,.cardcard{padding:16px;margin-bottom:12px}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
  .modal{width:100%;max-width:420px;padding:24px}
  .modal h3{margin-bottom:16px}
  .modal .footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="login">
  <div class="card login-card">
    <div class="brand">◆ Finlytics</div>
    <div class="sub">Painel financeiro</div>
    <label>E-mail</label>
    <input id="email" type="email" value="lucas2@teste.com" />
    <label>Senha</label>
    <input id="senha" type="password" value="Senha@123" />
    <button id="loginBtn" class="btn-primary block">Entrar</button>
    <div id="loginErr" class="err"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <div class="brand">◆ Finlytics</div>
    <div class="userbox">
      <span id="who"></span>
      <span id="plano" class="badge"></span>
      <button class="ghost" id="themeBtn" title="Tema">🌙</button>
      <button class="ghost" id="logoutBtn">Sair</button>
    </div>
  </header>
  <nav class="tabs" id="tabs">
    <button data-tab="dashboard" class="active">Dashboard</button>
    <button data-tab="transacoes">Transações</button>
    <button data-tab="metas">Metas</button>
    <button data-tab="cartoes">Cartões</button>
    <button data-tab="investimentos">Investimentos</button>
  </nav>
  <main>
    <!-- DASHBOARD -->
    <section id="sec-dashboard">
      <div class="toolbar">
        <button class="ghost" id="refreshBtn">↻ Atualizar</button>
        <button class="ghost" id="runJobs">▶ Rodar tarefas</button>
        <button class="ghost" onclick="exportar('pdf')">⬇ PDF</button>
        <button class="ghost" onclick="exportar('xlsx')">⬇ Excel</button>
        <span class="muted" id="periodoLbl"></span>
      </div>
      <div class="kpis">
        <div class="card kpi"><div class="lbl">Saldo do mês</div><div class="val" id="kSaldo">—</div></div>
        <div class="card kpi"><div class="lbl">Receitas</div><div class="val pos" id="kReceitas">—</div></div>
        <div class="card kpi"><div class="lbl">Despesas</div><div class="val neg" id="kDespesas">—</div></div>
        <div class="card kpi"><div class="lbl">Patrimônio</div><div class="val" id="kPatrimonio">—</div></div>
      </div>
      <div class="grid2">
        <div class="card panel"><h3>Despesas por categoria</h3><canvas id="catChart" height="220"></canvas></div>
        <div class="card panel"><h3>Receita x Despesa</h3><canvas id="ieChart" height="220"></canvas></div>
      </div>
      <div class="card panel"><h3>Alertas</h3><div id="alertsBox"><div class="muted">—</div></div></div>
    </section>

    <!-- TRANSAÇÕES -->
    <section id="sec-transacoes" class="hidden">
      <div class="card panel">
        <div class="row"><h3>Transações</h3><button class="btn-primary" onclick="formTransacao()">+ Nova transação</button></div>
        <table><thead><tr><th>Descrição</th><th>Categoria</th><th>Data</th><th style="text-align:right">Valor</th><th></th></tr></thead>
        <tbody id="trxBody"><tr><td colspan="5" class="muted">—</td></tr></tbody></table>
      </div>
    </section>

    <!-- METAS -->
    <section id="sec-metas" class="hidden">
      <div class="row"><h3>Metas</h3><button class="btn-primary" onclick="formMeta()">+ Nova meta</button></div>
      <div id="metasBox"></div>
    </section>

    <!-- CARTÕES -->
    <section id="sec-cartoes" class="hidden">
      <div class="row"><h3>Cartões</h3><button class="btn-primary" onclick="formCartao()">+ Novo cartão</button></div>
      <div id="cartoesBox"></div>
    </section>

    <!-- INVESTIMENTOS -->
    <section id="sec-investimentos" class="hidden">
      <div class="row"><h3>Investimentos</h3><button class="btn-primary" onclick="formInvestimento()">+ Novo investimento</button></div>
      <div id="investBox"></div>
    </section>
  </main>
</div>

<div id="modalRoot"></div>

<script>
const API = location.protocol.startsWith('http') ? '/v1' : 'http://localhost:3000/v1';
let token = null, catChart, ieChart, categorias = [];
const money = (v)=>Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const dt = (v)=>new Date(v).toLocaleDateString('pt-BR');
const $ = (id)=>document.getElementById(id);

async function api(path, opts={}){
  const res = await fetch(API+path,{...opts,headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{}),...(opts.headers||{})}});
  if(res.status===403) return {__forbidden:true};
  if(!res.ok) throw new Error((await res.json().catch(()=>({}))).message || ('HTTP '+res.status));
  return res.status===204 ? null : res.json();
}

// ---------- TEMA ----------
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); $('themeBtn').textContent = t==='dark'?'☀️':'🌙'; localStorage.setItem('finlytics-theme', t); }
$('themeBtn').onclick = ()=> applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
applyTheme(localStorage.getItem('finlytics-theme') || 'light');

// ---------- LOGIN ----------
$('loginBtn').onclick = async ()=>{
  $('loginErr').textContent=''; $('loginBtn').disabled=true; $('loginBtn').textContent='Entrando…';
  try{
    const data = await api('/autenticacao/login',{method:'POST',body:JSON.stringify({email:$('email').value,senha:$('senha').value})});
    token = data.tokenAcesso;
    $('who').textContent = data.usuario.nome;
    const plano = data.usuario.plano;
    $('plano').textContent = plano==='gratuito'?'GRATUITO':'PREMIUM';
    $('plano').className = 'badge'+(plano==='gratuito'?' free':'');
    $('login').classList.add('hidden'); $('app').classList.remove('hidden');
    categorias = await api('/categorias');
    loadDashboard();
  }catch(e){ $('loginErr').textContent = e.message; }
  finally{ $('loginBtn').disabled=false; $('loginBtn').textContent='Entrar'; }
};
$('logoutBtn').onclick = ()=>{ token=null; location.reload(); };
$('refreshBtn').onclick = loadDashboard;
$('runJobs').onclick = async ()=>{
  $('runJobs').disabled=true; $('runJobs').textContent='Rodando…';
  try{ await Promise.all(['cotacoes','alertas','patrimonio'].map(j=>api('/tarefas/executar/'+j,{method:'POST'})));
       await new Promise(r=>setTimeout(r,1200)); await loadDashboard(); }
  catch(e){ alert(e.message); }
  finally{ $('runJobs').disabled=false; $('runJobs').textContent='▶ Rodar tarefas'; }
};

// ---------- ABAS ----------
$('tabs').addEventListener('click',(e)=>{
  const b = e.target.closest('button[data-tab]'); if(!b) return;
  document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  ['dashboard','transacoes','metas','cartoes','investimentos'].forEach(s=>$('sec-'+s).classList.add('hidden'));
  const tab=b.dataset.tab; $('sec-'+tab).classList.remove('hidden');
  if(tab==='transacoes') loadTransacoes();
  if(tab==='metas') loadMetas();
  if(tab==='cartoes') loadCartoes();
  if(tab==='investimentos') loadInvestimentos();
});

// ---------- DASHBOARD ----------
async function loadDashboard(){
  const agora=new Date(), mes=agora.getMonth()+1, ano=agora.getFullYear();
  $('periodoLbl').textContent='Período: '+String(mes).padStart(2,'0')+'/'+ano;
  const [rel,alertas,patr] = await Promise.all([api('/relatorios/mensal?mes='+mes+'&ano='+ano),api('/alertas'),api('/patrimonio')]);
  $('kSaldo').textContent=money(rel.totais.saldo); $('kReceitas').textContent=money(rel.totais.receitas);
  $('kDespesas').textContent=money(rel.totais.despesas);
  $('kPatrimonio').textContent=patr.__forbidden?'— (Premium)':money(patr.patrimonioLiquido);
  renderCat(rel.linhas.filter(l=>l.tipo==='despesa')); renderIE(rel.totais);
  $('alertsBox').innerHTML = (alertas&&alertas.length)? alertas.slice(0,6).map(a=>'<div class="alert"><div class="t">'+a.titulo+'</div><div class="m">'+a.mensagem+'</div></div>').join('') : '<div class="muted">Nenhum alerta. 🎉</div>';
}
function renderCat(linhas){
  const cores=['#E5484D','#F5A623','#1F6FEB','#00B37E','#A855F7','#0EA5E9','#FB7185','#94A3B8'];
  if(catChart) catChart.destroy();
  catChart=new Chart($('catChart'),{type:'doughnut',data:{labels:linhas.map(l=>l.categoriaNome),datasets:[{data:linhas.map(l=>l.total),backgroundColor:cores}]},options:{plugins:{legend:{position:'right',labels:{color:getCol()}}}}});
}
function renderIE(t){
  if(ieChart) ieChart.destroy();
  ieChart=new Chart($('ieChart'),{type:'bar',data:{labels:['Receitas','Despesas','Saldo'],datasets:[{data:[t.receitas,t.despesas,t.saldo],backgroundColor:['#00B37E','#E5484D','#1F6FEB']}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:getCol()}},x:{ticks:{color:getCol()}}}}});
}
function getCol(){ return getComputedStyle(document.documentElement).getPropertyValue('--text'); }

async function exportar(formato){
  const agora=new Date(), mes=agora.getMonth()+1, ano=agora.getFullYear();
  try{
    const res=await fetch(API+'/relatorios/mensal/exportar?mes='+mes+'&ano='+ano+'&formato='+formato,{headers:{Authorization:'Bearer '+token}});
    if(!res.ok){ alert('Não foi possível exportar (recurso Premium).'); return; }
    const blob=await res.blob(); const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='relatorio-'+ano+'-'+mes+'.'+formato; a.click(); URL.revokeObjectURL(url);
  }catch(e){ alert(e.message); }
}

// ---------- TRANSAÇÕES ----------
async function loadTransacoes(){
  const r=await api('/transacoes?limite=50'); const itens=r.itens||[];
  const nome=(id)=>categorias.find(c=>c.id===id)?.nome||'—';
  $('trxBody').innerHTML = itens.length? itens.map(t=>{
    const sinal=t.tipo==='receita'?'+':'-', cls=t.tipo==='receita'?'pos':'neg';
    return '<tr><td>'+(t.descricao||'—')+'</td><td class="muted">'+nome(t.categoriaId)+'</td><td class="muted">'+dt(t.data)+'</td>'
      +'<td style="text-align:right" class="'+cls+'">'+sinal+' '+money(t.valor)+'</td>'
      +'<td class="actions" style="text-align:right"><button class="ghost" onclick=\'editarTransacao('+JSON.stringify(t)+')\'>✏️</button>'
      +'<button class="ghost del" onclick="excluirTransacao(\''+t.id+'\')">🗑</button></td></tr>';
  }).join('') : '<tr><td colspan="5" class="muted">Sem transações.</td></tr>';
}
function catOptions(tipo){ return categorias.filter(c=>!tipo||c.tipo===tipo||c.tipo==='ambos').map(c=>({value:c.id,label:c.nome})); }
function formTransacao(){
  openModal('Nova transação',[
    {name:'tipo',label:'Tipo',type:'select',options:[{value:'despesa',label:'Despesa'},{value:'receita',label:'Receita'}]},
    {name:'valor',label:'Valor (R$)',type:'number'},
    {name:'categoriaId',label:'Categoria',type:'select',options:catOptions()},
    {name:'data',label:'Data',type:'date',value:new Date().toISOString().slice(0,10)},
    {name:'descricao',label:'Descrição',type:'text'},
  ], async (v)=>{ v.valor=Number(v.valor); await api('/transacoes',{method:'POST',body:JSON.stringify(v)}); loadTransacoes(); });
}
function editarTransacao(t){
  openModal('Editar transação',[
    {name:'valor',label:'Valor (R$)',type:'number',value:t.valor},
    {name:'categoriaId',label:'Categoria',type:'select',options:catOptions(),value:t.categoriaId},
    {name:'data',label:'Data',type:'date',value:new Date(t.data).toISOString().slice(0,10)},
    {name:'descricao',label:'Descrição',type:'text',value:t.descricao||''},
  ], async (v)=>{ v.valor=Number(v.valor); await api('/transacoes/'+t.id,{method:'PATCH',body:JSON.stringify(v)}); loadTransacoes(); });
}
async function excluirTransacao(id){ if(!confirm('Excluir esta transação?'))return; await api('/transacoes/'+id,{method:'DELETE'}); loadTransacoes(); }

// ---------- METAS ----------
async function loadMetas(){
  const metas=await api('/metas');
  $('metasBox').innerHTML = metas.length? metas.map(m=>{
    return '<div class="card goalcard"><div class="row" style="margin:0"><b>'+m.titulo+'</b><span class="muted">'+(m.progresso||0)+'%</span></div>'
      +'<div class="prog"><i style="width:'+(m.progresso||0)+'%"></i></div>'
      +'<div class="row" style="margin:0"><span class="muted">'+money(m.valorAtual)+' / '+money(m.valorAlvo)+'</span>'
      +'<span><button class="ghost" onclick="aportar(\''+m.id+'\')">+ Aporte</button> <button class="ghost del" onclick="excluirMeta(\''+m.id+'\')">🗑</button></span></div></div>';
  }).join('') : '<div class="muted">Nenhuma meta ainda.</div>';
}
function formMeta(){
  openModal('Nova meta',[
    {name:'titulo',label:'Título',type:'text'},
    {name:'valorAlvo',label:'Valor alvo (R$)',type:'number'},
    {name:'dataAlvo',label:'Data alvo',type:'date'},
  ], async (v)=>{ v.valorAlvo=Number(v.valorAlvo); await api('/metas',{method:'POST',body:JSON.stringify(v)}); loadMetas(); });
}
function aportar(id){ openModal('Registrar aporte',[{name:'valor',label:'Valor (R$)',type:'number'}], async (v)=>{ await api('/metas/'+id+'/aportes',{method:'POST',body:JSON.stringify({valor:Number(v.valor)})}); loadMetas(); }); }
async function excluirMeta(id){ if(!confirm('Excluir meta?'))return; await api('/metas/'+id,{method:'DELETE'}); loadMetas(); }

// ---------- CARTÕES ----------
async function loadCartoes(){
  const cartoes=await api('/cartoes');
  if(!cartoes.length){ $('cartoesBox').innerHTML='<div class="muted">Nenhum cartão.</div>'; return; }
  const faturas=await Promise.all(cartoes.map(c=>api('/cartoes/'+c.id+'/fatura')));
  $('cartoesBox').innerHTML = cartoes.map((c,i)=>{
    const f=faturas[i]||{usado:0,limite:Number(c.limite)}; const pct=f.limite?Math.round(f.usado/f.limite*100):0;
    return '<div class="card cardcard"><div class="row" style="margin:0"><b>'+c.banco+' · '+c.bandeira+'</b>'
      +'<button class="ghost del" onclick="excluirCartao(\''+c.id+'\')">🗑</button></div>'
      +'<div class="prog"><i style="width:'+pct+'%;background:var(--primary)"></i></div>'
      +'<div class="muted">Usado '+money(f.usado)+' de '+money(f.limite)+' ('+pct+'%) · Fecha dia '+c.diaFechamento+' · Vence dia '+c.diaVencimento+'</div></div>';
  }).join('');
}
function formCartao(){
  openModal('Novo cartão',[
    {name:'banco',label:'Banco',type:'text'},
    {name:'bandeira',label:'Bandeira',type:'text'},
    {name:'limite',label:'Limite (R$)',type:'number'},
    {name:'diaFechamento',label:'Dia de fechamento',type:'number',value:3},
    {name:'diaVencimento',label:'Dia de vencimento',type:'number',value:10},
  ], async (v)=>{ v.limite=Number(v.limite); v.diaFechamento=Number(v.diaFechamento); v.diaVencimento=Number(v.diaVencimento); await api('/cartoes',{method:'POST',body:JSON.stringify(v)}); loadCartoes(); });
}
async function excluirCartao(id){ if(!confirm('Excluir cartão?'))return; await api('/cartoes/'+id,{method:'DELETE'}); loadCartoes(); }

// ---------- INVESTIMENTOS ----------
async function loadInvestimentos(){
  const r=await api('/investimentos');
  if(r.__forbidden){ $('investBox').innerHTML='<div class="muted">Investimentos disponíveis no plano Premium.</div>'; return; }
  $('investBox').innerHTML = r.length? '<div class="card panel"><table><thead><tr><th>Ativo</th><th>Qtd</th><th>Preço médio</th><th>Atual</th><th style="text-align:right">Lucro</th><th></th></tr></thead><tbody>'
    + r.map(i=>{const cls=i.lucro>=0?'pos':'neg';return '<tr><td>'+i.ticker+'<br><span class="muted">'+i.tipoAtivo+'</span></td><td>'+i.quantidade+'</td><td>'+money(i.precoMedio)+'</td><td>'+money(i.precoAtual||i.precoMedio)+'</td>'
    +'<td style="text-align:right" class="'+cls+'">'+money(i.lucro)+'<br><span class="muted">'+(i.rentabilidade||0).toFixed(1)+'%</span></td>'
    +'<td style="text-align:right"><button class="ghost del" onclick="excluirInvest(\''+i.id+'\')">🗑</button></td></tr>';}).join('')
    + '</tbody></table></div>' : '<div class="muted">Nenhum investimento.</div>';
}
function formInvestimento(){
  openModal('Novo investimento',[
    {name:'tipoAtivo',label:'Tipo',type:'select',options:['cdb','lci','lca','tesouro','fii','acao','etf','internacional'].map(t=>({value:t,label:t}))},
    {name:'ticker',label:'Ticker / Nome',type:'text'},
    {name:'quantidade',label:'Quantidade',type:'number'},
    {name:'precoMedio',label:'Preço médio (R$)',type:'number'},
  ], async (v)=>{ v.quantidade=Number(v.quantidade); v.precoMedio=Number(v.precoMedio); await api('/investimentos',{method:'POST',body:JSON.stringify(v)}); loadInvestimentos(); });
}
async function excluirInvest(id){ if(!confirm('Excluir investimento?'))return; await api('/investimentos/'+id,{method:'DELETE'}); loadInvestimentos(); }

// ---------- MODAL GENÉRICO ----------
function openModal(titulo, campos, onSubmit){
  const html = '<div class="overlay" id="ovl"><div class="card modal"><h3>'+titulo+'</h3><form id="mform">'
    + campos.map(c=>{
        if(c.type==='select'){
          return '<label>'+c.label+'</label><select name="'+c.name+'">'+c.options.map(o=>'<option value="'+o.value+'"'+(c.value===o.value?' selected':'')+'>'+o.label+'</option>').join('')+'</select>';
        }
        return '<label>'+c.label+'</label><input name="'+c.name+'" type="'+c.type+'" step="any" value="'+(c.value!==undefined?c.value:'')+'" />';
      }).join('')
    + '<div class="footer"><button type="button" class="ghost" id="mcancel">Cancelar</button><button type="submit" class="btn-primary">Salvar</button></div></form></div></div>';
  $('modalRoot').innerHTML = html;
  $('mcancel').onclick = ()=> $('modalRoot').innerHTML='';
  $('mform').onsubmit = async (e)=>{
    e.preventDefault();
    const v={}; new FormData(e.target).forEach((val,k)=>{ if(val!=='') v[k]=val; });
    try{ await onSubmit(v); $('modalRoot').innerHTML=''; }catch(err){ alert(err.message); }
  };
}
$('senha').addEventListener('keydown',e=>{ if(e.key==='Enter') $('loginBtn').click(); });
</script>
</body>
</html>
