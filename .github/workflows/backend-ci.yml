name: Backend CI

on:
  push:
    branches: [main, develop]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/backend-ci.yml']

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: finlytics
          POSTGRES_PASSWORD: finlytics
          POSTGRES_DB: finlytics_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U finlytics"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgresql://finlytics:finlytics@localhost:5432/finlytics_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      NODE_ENV: test
      PORT: 3000
      JOBS_ENABLED: 'false'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm install
      - name: Prisma generate
        run: npx prisma generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Unit tests + coverage
        run: npm run test:cov
      - name: E2E tests
        run: npm run test:e2e
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
