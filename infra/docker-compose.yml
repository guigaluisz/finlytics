version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    container_name: finlytics-postgres
    environment:
      POSTGRES_USER: finlytics
      POSTGRES_PASSWORD: finlytics
      POSTGRES_DB: finlytics
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finlytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finlytics-redis
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redisdata:/data"]

volumes:
  pgdata:
  redisdata:
